#############
### INPUT ###
#############
input {
  # Keyboard 
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  # Mouse
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  accel_profile = adaptive

  touchpad {
      natural_scroll = true
      disable_while_typing = true
      scroll_factor = 0.2
  }

}

# Acer wireless mouse
device {
  name = telink-wireless-receiver-mouse
  sensitivity = -0.95
  accel_profile = adaptive
    scroll_factor = 1.5
}

gesture = 3, horizontal, workspace
