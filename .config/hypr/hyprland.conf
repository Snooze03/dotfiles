#############################
### ENVIRONMENT VARIABLES ###
#############################
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2 # Specifies which gpu to use for rendering HYPRLAND, card1(nvidia) card2(amd)
env = NVD_BACKEND,direct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### MY PROGRAMS ###
###################
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun
$ipc = qs -c noctalia-shell ipc call
$powerMenu = ~/.config/rofi/scripts/powerMenu.sh
$displayMenu = ~/.config/rofi/scripts/displayMenu.sh


#################
###  MODULES  ###
#################
source = ./modules/binds.conf
source = ./modules/inputs.conf
source = ./modules/decorations.conf
source = ./modules/windowRules.conf


#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = qs -c noctalia-shell --no-duplicate
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie &


################
### MONITORS ###
################
# Lid switch
bindl=,switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"
bindl=,switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1, preferred, 0x0, 1.2"

# Monitor Settings
monitor=eDP-1,preferred,0x0,1.2
monitor=HDMI-A-1,1920x1080@75,auto-right,1

# fixes ui scale on internal display
xwayland {
  force_zero_scaling = true
}


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

